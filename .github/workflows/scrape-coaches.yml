name: Scrape coaches + rosters + Scorecard (monthly)

# Monthly refresh of:
#   • server/data/coachesScraped.json (via scrapeCoaches.ts + inferEmails.ts)
#   • server/data/rostersScraped.json (via scrapeRosters.ts)
#   • server/data/schoolsAcademic.json (via enrichWithScorecard.ts)
# Opens a single PR with all changes. Manual trigger is also enabled.
#
# Required secrets:
#   ANTHROPIC_API_KEY            — for inferEmails.ts (Haiku guesses email format)
#   COLLEGE_SCORECARD_API_KEY    — for enrichWithScorecard.ts (free, api.data.gov)

on:
  schedule:
    - cron: '0 0 1 * *'  # 00:00 UTC, 1st of each month
  workflow_dispatch:
    inputs:
      concurrency:
        description: 'Puppeteer concurrency (CI default: 5)'
        required: false
        default: '5'

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # scrape can take ~60–90 min; pad for retries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run scraper (--resume)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CONCURRENCY="${{ github.event.inputs.concurrency || '5' }}"
          npx tsx server/scripts/scrapeCoaches.ts --resume --concurrency=$CONCURRENCY

      - name: Infer emails for name-only entries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx server/scripts/inferEmails.ts

      - name: Refresh rosters (--resume)
        run: |
          CONCURRENCY="${{ github.event.inputs.concurrency || '5' }}"
          npx tsx server/scripts/scrapeRosters.ts --resume --concurrency=$CONCURRENCY

      - name: Refresh College Scorecard academic data
        env:
          COLLEGE_SCORECARD_API_KEY: ${{ secrets.COLLEGE_SCORECARD_API_KEY }}
        run: npx tsx server/scripts/enrichWithScorecard.ts --resume

      - name: Open PR with cache changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: monthly data refresh (coaches + rosters + Scorecard)'
          title: 'Monthly data refresh — coaches + rosters + Scorecard'
          body: |
            Automated monthly refresh of:

            - `server/data/coachesScraped.json` — re-scrape + email inference
            - `server/data/rostersScraped.json` — roster open-spots refresh
            - `server/data/schoolsAcademic.json` — College Scorecard refresh

            Review before merging:
            - Flips from `email-inferred` → `partial` mean the inference pass
              had no new names. Flips to `success` mean the site was fixed.
            - Roster diffs reflect player turnover — graduating seniors leave,
              freshmen arrive. Open-spots numbers should drift each year.
            - Scorecard data only changes when ED publishes new annual updates,
              so most monthly diffs there will be small.
          branch: bot/data-refresh
          delete-branch: true
          add-paths: |
            server/data/coachesScraped.json
            server/data/rostersScraped.json
            server/data/schoolsAcademic.json

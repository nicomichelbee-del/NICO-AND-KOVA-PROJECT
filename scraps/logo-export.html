<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>KickrIQ Logo Export</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../styles-logo.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; font-family: var(--sans); }
    .stage {
      display: flex; flex-direction: column; gap: 64px; padding: 64px;
      background: transparent;
      align-items: flex-start;
    }
    .row { display: inline-flex; align-items: center; gap: 24px; }
    .row.dark { background: #221913; padding: 32px 48px; border-radius: 16px; }
    .row.cream { background: #f6efde; padding: 32px 48px; border-radius: 16px; }
    .row.cream .klogo-kickr { color: #221913 !important; }
    .row.cream .klogo-iq { color: #b8821a !important; }
    .row.cream .klogo-i .pentagon-dot,
    .row.cream .klogo-i::before {
      filter: brightness(0.6);
    }
    .label { color: #888; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-family: monospace; padding-left: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components-logo.jsx"></script>
  <script type="text/babel">
    const { KickrIQLogo, KickrIQIcon } = window;
    const App = () => (
      <div className="stage">
        <div>
          <div className="label">Wordmark · dark surface</div>
          <div className="row dark"><KickrIQLogo height={96} /></div>
        </div>
        <div>
          <div className="label">Wordmark · light surface</div>
          <div className="row cream"><KickrIQLogo height={96} /></div>
        </div>
        <div>
          <div className="label">Icon mark</div>
          <div className="row dark"><KickrIQIcon size={128} /></div>
        </div>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
